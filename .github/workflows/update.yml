name: Update dashboard

# Runs on GitHub's servers, so updates happen even when your PC is off.
on:
  schedule:
    - cron: "0 22 * * *"      # daily at 22:00 UTC (10pm GMT)
  workflow_dispatch: {}         # lets you run it on demand from the Actions tab

permissions:
  contents: write               # allow committing the rebuilt dashboard

concurrency:                    # never let two runs overlap
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Persist the SQLite DB across runs so updates are incremental (only new
      # matches are fetched). A cache miss self-heals: the seed list below
      # rebuilds every division from scratch via transitive discovery.
      - name: Restore database cache
        uses: actions/cache/restore@v4
        with:
          path: faceit.sqlite3
          key: faceit-db-${{ github.run_id }}
          restore-keys: faceit-db-

      - name: Install the tool
        run: pip install -e .

      - name: Update all divisions + rebuild dashboard
        run: |
          # Seed known teams from the committed match list (idempotent), then let
          # the keyless enumerator discover and ingest every finished league match
          # across all divisions. Already-stored finished matches are skipped.
          # A stray unreachable match must not block the daily dashboard update,
          # so fetch errors are tolerated; the export must still succeed.
          faceit-sync --db faceit.sqlite3 fetch --matches-file matches.txt || echo "seed: some matches errored (continuing)"
          faceit-sync --db faceit.sqlite3 fetch || echo "update: some matches errored (continuing)"
          faceit-sync --db faceit.sqlite3 export --format html --out docs/index.html

      - name: Save database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: faceit.sqlite3
          key: faceit-db-${{ github.run_id }}

      - name: Publish if the dashboard changed
        run: |
          git config user.name  "faceit-scout-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "No changes — nothing to publish."
          else
            git commit -m "Auto-update dashboard ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "Published updated dashboard."
          fi
