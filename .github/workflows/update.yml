name: Update dashboard

# Runs on GitHub's servers, so updates happen even when your PC is off.
on:
  schedule:
    # Target: 9pm UK time, every day, year-round. GitHub cron is UTC-only and
    # 9pm London is 20:00 UTC in summer (BST) but 21:00 UTC in winter (GMT) -
    # so BOTH hours are scheduled and the gate job below runs the one where
    # it is actually 21:00 in London, skipping the shadow. Minute :17 because
    # on-the-hour crons are GitHub's most congested slot and get delayed most.
    - cron: "17 20 * * *"
    - cron: "17 21 * * *"
  workflow_dispatch: {}         # lets you run it on demand from the Actions tab
  push:
    paths:
      - "data/captures/**"      # a contribution upload rebuilds the site in ~2min

permissions:
  contents: write               # allow committing the rebuilt dashboard

concurrency:                    # never let two runs overlap
  group: update-dashboard
  cancel-in-progress: false

jobs:
  # Which of the two daily crons is really 9pm in London? (Manual runs and
  # data pushes always proceed.)
  gate:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.check.outputs.go }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          hour=$(TZ=Europe/London date +%H)
          echo "London hour: $hour"
          if [ "$hour" = "21" ]; then echo "go=true" >> "$GITHUB_OUTPUT";
          else echo "go=false" >> "$GITHUB_OUTPUT"; fi

  update:
    needs: gate
    if: needs.gate.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: which contributor owns a contested map is decided by
          # the commit that ADDED their file, and a shallow clone cannot see it
          # (every file would look equally old and silently fall back to name
          # order). See git_submission_order in owscout/contribute.py.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Persist the SQLite DB across runs so updates are incremental (only new
      # matches are fetched). A cache miss self-heals: the seed list below
      # rebuilds every division from scratch via transitive discovery.
      - name: Restore database cache
        uses: actions/cache/restore@v4
        with:
          path: faceit.sqlite3
          key: faceit-db-${{ github.run_id }}
          restore-keys: faceit-db-

      - name: Install the tool
        run: pip install -e .

      - name: Update all divisions + rebuild dashboard
        run: |
          # Seed known teams from the committed match list (idempotent), then let
          # the keyless enumerator discover and ingest every finished league match
          # across all divisions. Already-stored finished matches are skipped -
          # EXCEPT the two cases that can still gain a replay code: a match with
          # a partial gap (some games have codes) within --backfill-days, and any
          # match ingested in the last 12 hours. Matches with no code on any game
          # are permanently code-less and are not re-fetched.
          # A stray unreachable match must not block the daily dashboard update,
          # so fetch errors are tolerated; the export must still succeed.
          faceit-sync --db faceit.sqlite3 fetch --matches-file matches.txt || echo "seed: some matches errored (continuing)"
          faceit-sync --db faceit.sqlite3 fetch || echo "update: some matches errored (continuing)"
          # Scouting data arrives as RAW OBSERVATIONS, one file per contributor
          # under data/captures/. Merge them here rather than committing a derived
          # payload: the report is then always computed by the current analysis,
          # so improvements apply retroactively to every past contribution.
          # First-wins on a contested map, ordered by commit date (a contributor
          # cannot vote on their own priority) - see owscout/contribute.py.
          if [ -n "$(ls -A data/captures/*.json 2>/dev/null)" ]; then
            owscout --faceit-db faceit.sqlite3 contribute merge --dir data/captures --out owscout_comps.json
          else
            echo "no contributions yet - dashboard will build without captured comps"
          fi
          # docs/index.html is the LIVE SITE and this job is its only writer.
          # export reads owscout_comps.json from the repo root.
          faceit-sync --db faceit.sqlite3 export --format html --out docs/index.html

      - name: Save database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: faceit.sqlite3
          key: faceit-db-${{ github.run_id }}

      - name: Publish if the dashboard changed
        run: |
          git config user.name  "faceit-scout-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "No changes — nothing to publish."
          else
            git commit -m "Auto-update dashboard ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "Published updated dashboard."
          fi
