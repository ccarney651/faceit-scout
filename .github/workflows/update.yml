name: Update dashboard

# Runs on GitHub's servers, so updates happen even when your PC is off.
on:
  schedule:
    - cron: "0 21 * * *"      # daily at 21:00 UTC (after evening matches finish)
  workflow_dispatch: {}         # lets you run it on demand from the Actions tab

permissions:
  contents: write               # allow committing the rebuilt dashboard

concurrency:                    # never let two runs overlap
  group: update-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the tool
        run: pip install -e .

      - name: Rebuild the whole league (stateless, keyless)
        run: |
          # Seed the known teams from the committed match list, then let the
          # keyless enumerator discover and ingest every finished league match.
          faceit-sync --db faceit.sqlite3 fetch --matches-file matches.txt
          faceit-sync --db faceit.sqlite3 fetch
          faceit-sync --db faceit.sqlite3 export --format html --out docs/index.html

      - name: Publish if the dashboard changed
        run: |
          git config user.name  "faceit-scout-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --cached --quiet; then
            echo "No changes — nothing to publish."
          else
            git commit -m "Auto-update dashboard ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push
            echo "Published updated dashboard."
          fi
